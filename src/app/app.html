<h2>{{ title() }}</h2>
<div class="nav">
  <a [routerLink]="['/home']" [queryParams]="{ page: 1 , sort: 'asc'}" routerLinkActive="active">Home</a>
  <a [routerLink]="['/about']" routerLinkActive="active">About</a>
  <a [routerLink]="['/contact']" routerLinkActive="active">Contact</a>
</div>
<div>
  <router-outlet></router-outlet>
</div>
<fieldset>
  <legend>SUBSCRIPTION</legend>

  <!-- Angular Form with two-way binding -->
  <form #subscriptionForm="ngForm" (ngSubmit)="onSubmit()">
    <table>
      <tr>
        <td>Email:</td>
        <td>
          <!-- ngModel for two-way binding -->
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
          />
        </td>
      </tr>
      <tr>
        <td colspan="2">
          <button type="submit" [disabled]="!subscriptionForm.valid">
            Subscribe
          </button>
        </td>
      </tr>
    </table>
  </form>

  <!-- Angular Directives -->
  <p *ngIf="status">
    {{ status | uppercase }}
  </p>

  <!-- Example of *ngFor directive -->
  <h3>Recent Subscribers</h3>
  <ul>
    <li *ngFor="let sub of subscribers; let i = index">
      {{ i + 1 }}. {{ sub | titlecase }}
    </li>
  </ul>
</fieldset>
